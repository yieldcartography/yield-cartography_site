<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80" width="460" height="80">
  <!-- Compact ridge mark, fits in a 70x70 box on the left -->
  <g transform="translate(8,8) scale(0.5)">
    <path d="M 10 118 C 25 113, 40 107, 60 99 S 90 84, 110 80"
          fill="none" stroke="#1f4e79" stroke-width="2.0" opacity="0.20"/>
    <path d="M 10 100 C 25 96, 40 88, 60 78 S 90 62, 110 58"
          fill="none" stroke="#1f4e79" stroke-width="2.6" opacity="0.35"/>
    <path d="M 10 90 C 25 84, 40 74, 60 62 S 90 44, 110 38"
          fill="none" stroke="#1f4e79" stroke-width="3.2" opacity="0.55"/>
    <path d="M 10 78 C 25 70, 40 58, 60 44 S 90 24, 110 18"
          fill="none" stroke="#c2522d" stroke-width="4.6" stroke-linecap="round"/>
    <circle cx="100" cy="22" r="5" fill="#c2522d" stroke="#fff" stroke-width="1.2"/>
    <circle cx="68"  cy="38" r="4" fill="#c2522d"/>
    <circle cx="50"  cy="50" r="3.6" fill="#1f4e79"/>
  </g>

  <!-- Wordmark on the right, vertically centred -->
  <g transform="translate(86,52)">
    <text font-family="'JetBrains Mono', 'Fira Code', 'Source Code Pro', Menlo, Consolas, monospace"
          font-weight="700" font-size="34" letter-spacing="-0.6">
      <tspan x="0" y="0" fill="#1a1a1a">yield</tspan><tspan x="111" y="0" fill="#1f4e79">cartography</tspan>
    </text>
    <!-- Brand separator: thin red bar at the visual mid-height of the wordmark.
         Replaces the underscore glyph, which sat at the baseline and visually
         dropped below the centre of the surrounding letters. -->
    <rect x="92" y="-12" width="15" height="4" rx="0.5" fill="#c2522d"/>
  </g>
</svg>
