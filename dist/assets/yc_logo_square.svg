<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2522d"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
  </defs>

  <!-- White square background -->
  <rect x="0" y="0" width="800" height="800" fill="#ffffff"/>

  <!-- Ridge mark scaled and centred. Original glyph spans roughly 120×130 from (10,-3) to (130,124).
       Scale by 5 (→ 600×650) and translate to centre in 800×800. -->
  <g transform="translate(100,80) scale(5)">

    <!-- Caption: PAST · PRESENT · PROJECTED -->
    <text x="2" y="-3"
          font-family="'JetBrains Mono', 'Fira Code', 'Source Code Pro', Menlo, Consolas, monospace"
          font-size="5.4" fill="#6a6a6a" opacity="0.7" font-weight="400"
          textLength="116" lengthAdjust="spacingAndGlyphs"
          letter-spacing="0.4">
      PAST · PRESENT · PROJECTED
    </text>

    <!-- Ridges -->
    <path d="M 10 118 C 25 113, 40 107, 60 99 S 90 84, 110 80"
          fill="none" stroke="#1f4e79" stroke-width="0.95" opacity="0.18"/>
    <path d="M 10 100 C 25 96, 40 88, 60 78 S 90 62, 110 58"
          fill="none" stroke="#1f4e79" stroke-width="1.2" opacity="0.32"/>
    <path d="M 10 90 C 25 84, 40 74, 60 62 S 90 44, 110 38"
          fill="none" stroke="#1f4e79" stroke-width="1.6" opacity="0.50"/>
    <path d="M 10 78 C 25 70, 40 58, 60 44 S 90 24, 110 18"
          fill="none" stroke="#c2522d" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Bond dots + arrows -->
    <circle cx="34" cy="80" r="2.4" fill="#1f4e79"/>
    <line x1="34" y1="80" x2="34" y2="74" stroke="#1f4e79" stroke-width="0.7" opacity="0.7" marker-end="url(#arr-b)"/>

    <circle cx="50" cy="50" r="2.0" fill="#1f4e79"/>
    <line x1="50" y1="50" x2="50" y2="56" stroke="#1f4e79" stroke-width="0.7" opacity="0.7" marker-end="url(#arr-b)"/>

    <circle cx="68" cy="38" r="2.4" fill="#c2522d"/>
    <line x1="68" y1="38" x2="68" y2="32" stroke="#c2522d" stroke-width="0.7" opacity="0.7" marker-end="url(#arr-r)"/>

    <circle cx="86" cy="32" r="2.0" fill="#1f4e79"/>
    <line x1="86" y1="32" x2="86" y2="26" stroke="#1f4e79" stroke-width="0.7" opacity="0.7" marker-end="url(#arr-b)"/>

    <circle cx="100" cy="22" r="2.6" fill="#c2522d" stroke="#fff" stroke-width="0.6"/>

    <!-- Baseline rule -->
    <line x1="2" y1="124" x2="118" y2="124" stroke="#1a1a1a" stroke-width="0.6" opacity="0.45"/>
  </g>
</svg>
